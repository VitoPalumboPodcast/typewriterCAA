<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Macchina da scrivere simbolica – v2 accessibile</title>

  <style>
    /* =========================
       VARIABILI E BASE LAYOUT
       ========================= */
    :root{
      --tile-size: 5.5rem;      /* dimensione base dei pulsanti/pedine */
      --gap-size: 0.5rem;       /* spaziatura tra pulsanti/pedine */
      --radius: .6rem;
      --fg: #111;
      --bg: #ffffff;
      --panel: #f6f6f6;
      --border: #cfcfcf;
      --accent: #0b6efd;
      --danger: #c0392b;
      --ok: #208b3a;
      --warn: #e67e22;
      --shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    *{ box-sizing: border-box; }
    html, body{ height:100%; }
    body{
      margin:0;
      color:var(--fg);
      background:var(--bg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji","Segoe UI Emoji", "Segoe UI Symbol";
      line-height:1.35;
    }

    /* =========================
       APP BAR / STRUMENTI
       ========================= */
    .toolbar{
      position: sticky; top:0;
      z-index:10;
      background:var(--panel);
      border-bottom:1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .toolbar-inner{
      max-width:1100px;
      margin:auto;
      display:flex;
      gap:.5rem;
      align-items:center;
      padding:.5rem;
      flex-wrap:wrap;
    }
    .toolbar .group{
      display:flex; gap:.4rem; align-items:center; flex-wrap:wrap;
      background:#fff; border:1px solid var(--border); border-radius: var(--radius);
      padding:.35rem .5rem;
    }
    .toolbar label{ font-size:.9rem; opacity:.85; }

    button, .btn{
      appearance:none; border:1px solid var(--border);
      background:#fff; color:var(--fg);
      padding:.45rem .7rem; border-radius:.5rem; cursor:pointer;
      font-size:1rem; line-height:1;
    }
    button:hover{ background:#fafafa; }
    button:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
    .btn-primary{ border-color:var(--accent); color:#fff; background:var(--accent); }
    .btn-ghost{ background:transparent; }
    .btn-danger{ border-color:var(--danger); color:#fff; background:var(--danger); }
    .btn-ok{ border-color:var(--ok); color:#fff; background:var(--ok); }
    .btn-warn{ border-color:var(--warn); color:#fff; background:var(--warn); }
    .segmented{
      display:flex; border:1px solid var(--border); border-radius:.5rem; overflow:hidden;
    }
    .segmented button{ border:0; border-right:1px solid var(--border); }
    .segmented button:last-child{ border-right:0; }
    .segmented button[aria-pressed="true"]{ background:var(--accent); color:#fff; }

    input[type="range"]{ accent-color: var(--accent); }

    /* =========================
       CONTENUTO
       ========================= */
    .container{ max-width:1100px; margin: 1rem auto; padding: 0 1rem; }

    /* Frase composta (token testuali) */
    #sentence{
      min-height: 3.2rem;
      padding: .6rem;
      border:1px solid var(--border);
      border-radius: var(--radius);
      background:#fff;
      font-size:1.4rem;
      display:flex; flex-wrap:wrap; gap:.35rem;
    }
    .token{
      padding:.1rem .4rem;
      border:2px solid #999;
      border-radius:.4rem;
      background:#fff;
      box-shadow: var(--shadow);
      align-self:center;
    }
    .token[data-cat="S"]{ border-color:#e74c3c; }
    .token[data-cat="V"]{ border-color:#2980b9; }
    .token[data-cat="O"]{ border-color:#27ae60; }
    .token[data-cat="X"]{ border-color:#8e44ad; }

    /* Output simbolico (simbolo + immagine) */
    #output{
      margin-top:.6rem;
      border:1px solid var(--border);
      border-radius: var(--radius);
      background:#fff;
      padding:.4rem;
      display:flex; flex-wrap:wrap; gap:.4rem;
      min-height:6rem;
    }
    .chip{
      display:flex; align-items:center; gap:.35rem;
      border:1px dashed #bbb; border-radius:.6rem;
      background:#fafafa; padding:.35rem .5rem;
    }
    .chip img{
      display:block; width:3.2rem; height:3.2rem; object-fit:cover; border-radius:.4rem;
      border:1px solid #ddd; background:#fff;
    }
    .chip .label{ font-size:1.2rem; }

    /* Griglia categorie / pulsanti */
    .section{ margin-top:1rem; }
    .section h2{
      font-size:1rem; font-weight:600; margin:.2rem 0 .5rem;
      color:#555; letter-spacing:.02em; text-transform:uppercase;
    }
    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(var(--tile-size), 1fr));
      gap: var(--gap-size);
    }
    .tile{
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:.35rem; padding:.4rem;
      background:#fff; border:1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      cursor:pointer;
      min-height: calc(var(--tile-size) + 1.2rem);
    }
    .tile:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
    .tile img{
      width: calc(var(--tile-size) - 1.2rem);
      height: calc(var(--tile-size) - 1.2rem);
      object-fit: cover;
      border-radius:.4rem;
      border:1px solid #e1e1e1;
      background:#fff;
    }
    .tile .tlabel{ font-size:1rem; line-height:1.1; text-align:center; }

    /* Colori cornice per categorie */
    .tile.S{ border-color:#e74c3c; }
    .tile.V{ border-color:#2980b9; }
    .tile.O{ border-color:#27ae60; }
    .tile.X{ border-color:#8e44ad; }

    /* Info */
    .note{
      font-size:.92rem; color:#666; margin-top:.5rem;
    }

    /* Alto contrasto */
    .high-contrast{
      --bg:#000; --fg:#fff; --panel:#000; --border:#888; --shadow:none;
      --accent:#ffd400;
    }
    .high-contrast button{ border-color:#888; }
    .high-contrast .tile{ background:#000; }
    .high-contrast .tile img{ border-color:#555; }
    .high-contrast #sentence, .high-contrast #output{ background:#000; }
  </style>
</head>
<body>

  <!-- =========================
       BARRA STRUMENTI ACCESSO
       ========================= -->
  <div class="toolbar" role="region" aria-label="Strumenti">
    <div class="toolbar-inner">

      <!-- Lettura / TTS -->
      <div class="group" role="group" aria-label="Lettura">
        <button class="btn-primary" id="btn-read" title="Leggi tutta la frase (Invio)">Leggi</button>
        <button class="btn-warn" id="btn-pause" title="Metti in pausa la lettura (P)">Pausa</button>
        <button class="btn-ok" id="btn-resume" title="Riprendi la lettura (R)">Riprendi</button>
        <button class="btn-danger" id="btn-stop" title="Ferma la lettura (S)">Stop</button>
        <div class="segmented" role="group" aria-label="Auto-lettura token">
          <button id="autoOn" aria-pressed="true" title="Leggi ogni token quando viene aggiunto">Auto On</button>
          <button id="autoOff" aria-pressed="false" title="Non leggere automaticamente i token">Auto Off</button>
        </div>
      </div>

      <!-- Modifica frase -->
      <div class="group" role="group" aria-label="Modifica frase">
        <button id="btn-undo" title="Annulla ultimo token (Ctrl+Z)">Annulla</button>
        <button id="btn-clear" class="btn-ghost" title="Cancella frase">Cancella</button>
        <button id="btn-read-token" class="btn-ghost" title="Leggi token selezionato">Leggi token</button>
      </div>

      <!-- Aspetto / Accessibilità -->
      <div class="group" role="group" aria-label="Aspetto">
        <label for="size">Larghezza</label>
        <input id="size" type="range" min="4.5" max="8.5" step=".5" value="5.5" />
        <label for="gap">Spaziatura</label>
        <input id="gap" type="range" min="0.2" max="1.2" step=".1" value="0.5" />
        <button id="btn-contrast" class="btn-ghost" title="Alto contrasto (C)">Contrasto</button>
      </div>

      <!-- Filtri categorie -->
      <div class="group" role="group" aria-label="Categorie">
        <div class="segmented" id="filters" role="tablist" aria-label="Filtra categoria">
          <button data-filter="ALL" aria-pressed="true">Tutte</button>
          <button data-filter="S" aria-pressed="false">Soggetti</button>
          <button data-filter="V" aria-pressed="false">Verbi</button>
          <button data-filter="O" aria-pressed="false">Oggetti</button>
          <button data-filter="X" aria-pressed="false">Sociali/Altro</button>
        </div>
      </div>

    </div>
  </div>

  <div class="container">
    <!-- =========================
         FRASE + OUTPUT SIMBOLICO
         ========================= -->
    <div class="section" aria-live="polite" aria-label="Frase composta">
      <h2>Frase</h2>
      <div id="sentence"></div>
      <div id="output" class="mt"></div>
      <p class="note">Suggerimento: clicca le pedine in basso. <kbd>Invio</kbd> legge tutta la frase. <kbd>Ctrl</kbd>+<kbd>Z</kbd> annulla l’ultimo token. Usa <em>Filtra categoria</em> per ridurre il carico visivo.</p>
    </div>

    <!-- =========================
         PALETTE PULSANTI
         ========================= -->
    <div class="section">
      <h2>Selettore</h2>
      <div id="grid" class="grid" role="grid" aria-label="Pulsanti comunicativi"></div>
    </div>
  </div>

  <script>
    /* ============================================================
       COSTANTI, UTILITIES, E DATI
       ============================================================ */

    // Prefisso assoluto per le immagini, come richiesto
    const BASE_URL = "https://www.vitopalumbo.it/INCLUSIONE/";

    // Esegue il join assoluto se serve
    const toAbsolute = (p) => {
      if (!p) return "";
      if (/^https?:\/\//i.test(p)) return p;
      return BASE_URL + p.replace(/^\/+/, "");
    };

    // Catalogo pulsanti (categoria: S=Subject, V=Verb, O=Object, X=Extra/Social)
    // Nota: per i verbi aggiuntivi non assumo esistenza di immagini → image: ""
    const CATALOG = [
      // SOGGETTI (S)
      { cat: "S", label: "Io", speak: "Io", image: "io.png" },

      // VERBI (V)
      { cat: "V", label: "voglio", speak: "voglio", image: "volere.png" },
      { cat: "V", label: "vorrei", speak: "vorrei", image: "" },
      { cat: "V", label: "posso", speak: "posso", image: "" },
      { cat: "V", label: "non voglio", speak: "non voglio", image: "" },

      // OGGETTI (O) – elenco originario
      { cat: "O", label: "il panino", speak: "il panino", image: "panino.jpg" },
      { cat: "O", label: "il pollo", speak: "il pollo", image: "pollo.jpg" },
      { cat: "O", label: "la pizza", speak: "la pizza", image: "pizza.jpg" },
      { cat: "O", label: "l'insalata", speak: "l'insalata", image: "insalata.jpg" },
      { cat: "O", label: "la melanzana", speak: "la melanzana", image: "melanzana.jpg" },
      { cat: "O", label: "l'arancia", speak: "l'arancia", image: "arancia.jpg" },
      { cat: "O", label: "la banana", speak: "la banana", image: "banana.jpg" },
      { cat: "O", label: "la mela", speak: "la mela", image: "mela.jpg" },
      { cat: "O", label: "la carota", speak: "la carota", image: "carota.jpg" },
      { cat: "O", label: "la caramella", speak: "la caramella", image: "caramella.jpg" },
      { cat: "O", label: "gli spaghetti", speak: "gli spaghetti", image: "spaghetti.jpg" },
      { cat: "O", label: "il cioccolatino", speak: "il cioccolatino", image: "cioccolatino.jpg" },
      { cat: "O", label: "il cappuccino", speak: "il cappuccino", image: "cappuccino.jpg" },
      { cat: "O", label: "le ciliegie", speak: "le ciliegie", image: "ciliegie.jpg" },

      // SOCIALI/EXTRA (X)
      { cat: "X", label: "per favore", speak: "per favore", image: "" },
      { cat: "X", label: "grazie", speak: "grazie", image: "" },
      { cat: "X", label: "aiuto", speak: "aiuto", image: "" },
      { cat: "X", label: "adesso", speak: "adesso", image: "" },
      { cat: "X", label: "poi", speak: "poi", image: "" }
    ];

    // Colori cornice per chip/token per coerenza visiva
    const BORDER_BY_CAT = { S: "#e74c3c", V: "#2980b9", O: "#27ae60", X: "#8e44ad" };

    // Stato applicativo
    const state = {
      tokens: [],                 // lista token {cat, label, speak, image}
      autoSpeak: true,            // lettura automatica di ogni token
      filter: "ALL",              // filtro categoria corrente
      voices: [],                 // voci TTS disponibili
      preferredVoice: null,       // voce preferita (it-IT se possibile)
      paused: false
    };

    /* ============================================================
       COSTRUZIONE UI: GRIGLIA, TOKEN, CHIP
       ============================================================ */
    const gridEl     = document.getElementById("grid");
    const sentenceEl = document.getElementById("sentence");
    const outputEl   = document.getElementById("output");

    function buildGrid(){
      gridEl.innerHTML = "";
      const items = CATALOG.filter(it => state.filter==="ALL" ? true : it.cat===state.filter);
      for (const it of items){
        const b = document.createElement("button");
        b.className = `tile ${it.cat}`;
        b.type = "button";
        b.setAttribute("role","gridcell");
        b.setAttribute("aria-label", it.label);
        b.title = it.label;
        b.tabIndex = 0;

        // immagine (se esiste)
        if (it.image){
          const img = document.createElement("img");
          img.alt = it.label;
          img.loading = "lazy";
          img.decoding = "async";
          img.src = toAbsolute(it.image);
          img.onerror = () => { img.style.visibility="hidden"; }; // se 404, nascondi
          b.appendChild(img);
        }

        const lab = document.createElement("div");
        lab.className = "tlabel";
        lab.textContent = it.label;
        b.appendChild(lab);

        b.addEventListener("click", () => addToken(it));
        b.addEventListener("keydown", (e)=>{ if(e.key==="Enter" || e.key===" "){ e.preventDefault(); b.click(); } });

        gridEl.appendChild(b);
      }
    }

    function renderSentence(){
      sentenceEl.innerHTML = "";
      state.tokens.forEach((t, idx) => {
        const s = document.createElement("span");
        s.className = "token";
        s.dataset.cat = t.cat;
        s.style.borderColor = BORDER_BY_CAT[t.cat] || "#999";
        s.textContent = t.label;
        s.tabIndex = 0;
        s.title = "Token " + (idx+1);
        s.addEventListener("click", ()=> speak(t.speak || t.label));
        sentenceEl.appendChild(s);
      });
    }

    function renderOutput(){
      outputEl.innerHTML = "";
      state.tokens.forEach(t => {
        const box = document.createElement("div");
        box.className = "chip";
        box.style.borderColor = (BORDER_BY_CAT[t.cat] || "#bbb");

        if (t.image){
          const img = document.createElement("img");
          img.alt = t.label;
          img.src = toAbsolute(t.image);
          img.onerror = () => { img.remove(); }; // se fallisce, mostra solo etichetta
          box.appendChild(img);
        }

        const lab = document.createElement("div");
        lab.className = "label";
        lab.textContent = t.label;
        box.appendChild(lab);

        outputEl.appendChild(box);
      });
    }

    function addToken(item){
      state.tokens.push(item);
      renderSentence();
      renderOutput();
      if (state.autoSpeak) speak(item.speak || item.label);
    }

    function undoLast(){
      if (!state.tokens.length) return;
      state.tokens.pop();
      renderSentence(); renderOutput();
    }

    function clearAll(){
      state.tokens = [];
      renderSentence(); renderOutput();
    }

    /* ============================================================
       TTS ROBUSTO (PAUSA/RIPRESA/STOP + VOCI it-IT)
       ============================================================ */
    const synth = window.speechSynthesis;

    function refreshVoices(){
      state.voices = synth.getVoices() || [];
      // Priorità: voce it-IT femminile → qualsiasi it-IT → default
      state.preferredVoice =
        state.voices.find(v => (v.lang || "").toLowerCase()==="it-it" && /female|femmina|donna/i.test(v.name)) ||
        state.voices.find(v => (v.lang || "").toLowerCase()==="it-it") ||
        null;
    }
    refreshVoices();
    // Alcuni browser popolano le voci in ritardo
    if (typeof window !== "undefined"){
      window.speechSynthesis.addEventListener("voiceschanged", refreshVoices);
    }

    let currentUtterance = null;

    function speak(text){
      if (!text || !text.trim()) return;
      stopSpeak(); // interrompe eventuale coda in corso e riparte
      currentUtterance = new SpeechSynthesisUtterance(text);
      if (state.preferredVoice) currentUtterance.voice = state.preferredVoice;
      currentUtterance.lang = (state.preferredVoice?.lang) || "it-IT";
      currentUtterance.rate = 0.9;
      currentUtterance.pitch = 0.9;
      synth.speak(currentUtterance);
      state.paused = false;
    }
    function pauseSpeak(){ if (synth.speaking && !synth.paused){ synth.pause(); state.paused = true; } }
    function resumeSpeak(){ if (synth.paused){ synth.resume(); state.paused = false; } }
    function stopSpeak(){ if (synth.speaking || synth.paused){ synth.cancel(); } state.paused=false; }

    function speakAll(){
      const text = state.tokens.map(t => t.speak || t.label).join(" ");
      speak(text);
    }

    /* ============================================================
       CONTROLLI TOOLBAR
       ============================================================ */
    // Lettura
    document.getElementById("btn-read").addEventListener("click", speakAll);
    document.getElementById("btn-pause").addEventListener("click", pauseSpeak);
    document.getElementById("btn-resume").addEventListener("click", resumeSpeak);
    document.getElementById("btn-stop").addEventListener("click", stopSpeak);

    // Auto lettura on/off
    const autoOn  = document.getElementById("autoOn");
    const autoOff = document.getElementById("autoOff");
    function setAuto(val){
      state.autoSpeak = !!val;
      autoOn.setAttribute("aria-pressed", state.autoSpeak ? "true" : "false");
      autoOff.setAttribute("aria-pressed", state.autoSpeak ? "false" : "true");
      localStorage.setItem("autoSpeak", state.autoSpeak ? "1" : "0");
    }
    autoOn.addEventListener("click", ()=> setAuto(true));
    autoOff.addEventListener("click",()=> setAuto(false));

    // Undo / Clear / Leggi token selezionato
    document.getElementById("btn-undo").addEventListener("click", undoLast);
    document.getElementById("btn-clear").addEventListener("click", clearAll);
    document.getElementById("btn-read-token").addEventListener("click", ()=>{
      const focused = document.activeElement;
      if (focused && focused.classList.contains("token")){
        speak(focused.textContent.trim());
      }
    });

    // Slider dimensioni e spaziatura
    const size = document.getElementById("size");
    const gap  = document.getElementById("gap");
    function applySizes(){
      document.documentElement.style.setProperty("--tile-size", size.value+"rem");
      document.documentElement.style.setProperty("--gap-size", gap.value+"rem");
      localStorage.setItem("tileSize", size.value);
      localStorage.setItem("gapSize", gap.value);
    }
    size.addEventListener("input", applySizes);
    gap.addEventListener("input", applySizes);

    // Alto contrasto
    const btnContrast = document.getElementById("btn-contrast");
    function toggleContrast(){
      document.body.classList.toggle("high-contrast");
      localStorage.setItem("contrast", document.body.classList.contains("high-contrast") ? "1":"0");
    }
    btnContrast.addEventListener("click", toggleContrast);

    // Filtro categorie (segment control)
    const filters = document.getElementById("filters");
    filters.addEventListener("click", (e)=>{
      const btn = e.target.closest("button[data-filter]");
      if (!btn) return;
      state.filter = btn.dataset.filter;
      for (const b of filters.querySelectorAll("button[data-filter]")){
        b.setAttribute("aria-pressed", b===btn ? "true" : "false");
      }
      buildGrid();
    });

    /* ============================================================
       TASTI RAPIDI
       ============================================================ */
    document.addEventListener("keydown", (e)=>{
      if (e.target && (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA")) return;

      if (e.key === "Enter"){
        e.preventDefault(); speakAll();
      } else if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase()==="z"){
        e.preventDefault(); undoLast();
      } else if (e.key.toLowerCase()==="c"){ // contrasto
        toggleContrast();
      } else if (e.key.toLowerCase()==="p"){ // pausa
        pauseSpeak();
      } else if (e.key.toLowerCase()==="r"){ // riprendi
        resumeSpeak();
      } else if (e.key.toLowerCase()==="s"){ // stop
        stopSpeak();
      }
    });

    /* ============================================================
       PERSISTENZA PREFERENZE
       ============================================================ */
    (function restorePrefs(){
      const as = localStorage.getItem("autoSpeak");
      const ts = localStorage.getItem("tileSize");
      const gs = localStorage.getItem("gapSize");
      const hc = localStorage.getItem("contrast");

      if (as !== null) setAuto(as==="1");
      if (ts){ size.value = ts; }
      if (gs){ gap.value  = gs; }
      applySizes();
      if (hc==="1") document.body.classList.add("high-contrast");
    })();

    /* ============================================================
       AVVIO
       ============================================================ */
    buildGrid();
    renderSentence();
    renderOutput();

  </script>

  <!-- =========================
       NOTE TECNICHE
       - Immagini caricate da https://www.vitopalumbo.it/INCLUSIONE/
       - Nessun backend. Tutto client-side.
       - Accessibilità: pulsanti <button>, aria-pressed, focus visibile, tastiera.
       - Preferenze utente (auto-lettura, dimensioni, contrasto) persistite in localStorage.
       - TTS robusto con gestione voci it-IT e controlli pausa/riprendi/stop.
       - Filtro categorie per ridurre carico visivo.
       ========================= -->
</body>
</html>
